window.seed = async function() {
  const btn = document.getElementById('seedBtn');
  const log = document.getElementById('log');
  btn.disabled = true;
  btn.textContent = 'Seeding...';
  log.innerHTML = '';

  try {
    log.innerHTML += `<div class="section">── Seeding Doctors ──</div>`;
    for (const doctor of shifaaDatabase.doctors) {
      await setDoc(doc(db, "doctors", doctor.id), doctor);
      log.innerHTML += `<div class="ok">✅ Doctor: ${doctor.name} (PMDC: ${doctor.pmdc})</div>`;
    }

    log.innerHTML += `<div class="section">── Seeding Labs ──</div>`;
    for (const lab of shifaaDatabase.labs) {
      await setDoc(doc(db, "labs", lab.id), lab);
      log.innerHTML += `<div class="ok">✅ Lab: ${lab.name} (${lab.city})</div>`;
    }

    log.innerHTML += `<div class="section">── Seeding Patients ──</div>`;
    for (const patient of shifaaDatabase.patients) {
      await setDoc(doc(db, "patients", patient.cnic), patient);
      log.innerHTML += `<div class="ok">✅ Patient: ${patient.name} (${patient.cnic})</div>`;
    }

    log.innerHTML += `<div class="done">🎉 Done! ${shifaaDatabase.doctors.length} doctors, ${shifaaDatabase.labs.length} labs, and ${shifaaDatabase.patients.length} patients loaded into Firebase.</div>`;
    btn.textContent = '✅ Seeded!';
  } catch(e) {
    log.innerHTML += `<div class="err">❌ Error: ${e.message}</div>`;
    btn.disabled = false;
    btn.textContent = 'Retry';
  }
};
